name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        # geopandas requires GDAL; rasterio requires libgdal
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin \
            libgeos-dev libproj-dev

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        # E/W: pycodestyle; F: pyflakes; I: isort; UP: pyupgrade
        # Ignoring E501 (line length) — GCEF has long prose strings in docstrings
        run: ruff check gcef/ --select E,F,W,I,UP --ignore E501

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libgeos-dev libproj-dev

      - name: Install package with stubs
        run: pip install -e ".[dev]" mypy types-requests pandas-stubs

      - name: Run mypy (non-blocking)
        # Non-blocking in v0.1 — mypy is informational only
        # Remove `|| true` when type annotations are complete
        run: mypy gcef/ --ignore-missing-imports --no-strict-optional || true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libgeos-dev libproj-dev

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=gcef \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
